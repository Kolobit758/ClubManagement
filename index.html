<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก | ระบบจัดการชุมนุม</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --bs-font-sans-serif: 'Sarabun', sans-serif; }
        body { background-color: #F9FAFB; font-family: var(--bs-font-sans-serif); padding-bottom: 50px; }
        .navbar { background-color: #FFFFFF; border-bottom: 1px solid #E5E7EB; }

        .club-card {
            background: #fff; border: 1px solid #E5E7EB;
            border-radius: 6px; padding: 1.25rem;
            height: 100%; display: flex; flex-direction: column;
        }


        .badge-code {
            background-color: #EFF6FF; color: #2563EB; border: 1px solid #BFDBFE;
            padding: 0.2rem 0.5rem; border-radius: 4px;
            font-size: 0.75rem; font-weight: 500;
        }

        .action-btn {
            background: #F8FAFC; border: none; border-radius: 4px;
            padding: 4px 6px; display: inline-flex; cursor: pointer; transition: 0.2s;
        }
        .action-btn.edit { color: #2563EB; background: #EFF6FF; }
        .action-btn.edit:hover { background: #DBEAFE; }
        .action-btn.delete { color: #DC2626; background: #FEF2F2; }
        .action-btn.delete:hover { background: #FEE2E2; }


        .club-title { font-size: 1.05rem; font-weight: 600; margin: 0.75rem 0; color: #111827; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: #6B7280; padding: 0.5rem 0; }
        .info-row.dashed { border-bottom: 1px dashed #E5E7EB; }
        .info-value { color: #111827; font-weight: 500; text-align: right; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }


        .btn-manage {
            width: 100%; background: transparent; border: 1px solid #4B5563; color: #111827;
            padding: 0.35rem; font-size: 0.85rem; border-radius: 4px;
            margin-top: auto; font-weight: 500; transition: 0.2s;
        }
        .btn-manage:hover { background: #F1F5F9; }

        .swal2-popup { font-family: var(--bs-font-sans-serif); border-radius: 8px; }
        .swal2-input, .swal2-textarea { font-size: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand sticky-top py-2">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-5 text-dark d-flex align-items-center gap-2" href="index.html">
                <i data-lucide="layout-grid" style="width: 20px;"></i> ระบบจัดการชุมนุม
            </a>
            <div class="d-flex gap-2">
                <a id="adminBtn" href="admin.html" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2 d-none">
                    <i data-lucide="settings" style="width: 16px;"></i> ผู้ดูแลระบบ
                </a>
                <button class="btn btn-outline-danger btn-sm d-flex align-items-center gap-2" onclick="logout()">
                    <i data-lucide="log-out" style="width: 16px;"></i> ออกจากระบบ
                </button>
            </div>
        </div>
    </nav>

    

    <div class="container mt-4 pt-3">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <h3 class="fw-bold mb-0">รายชื่อชุมนุมทั้งหมด</h3>
            <!-- ปุ่มเพิ่ม ใช้ onclick เรียก showCreateClubPopup() ใน home.js -->
            <button class="btn btn-primary d-flex align-items-center gap-2" onclick="showCreateClubPopup()">
                <i data-lucide="plus" style="width: 18px;"></i> เพิ่มชุมนุมใหม่
            </button>
        </div>

        <div id="clubList" class="row g-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
