<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ชุมนุม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      #dropZone {
        border: 2px dashed #6c757d;
        border-radius: 8px;
        padding: 32px;
        text-align: center;
        color: #6c757d;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        background: #f8f9fa;
      }
      #dropZone.dragover {
        background: #e7f3ff;
        border-color: #0d6efd;
        color: #0d6efd;
      }
      #dropZone input[type="file"] {
        display: none;
      }
      .status-badge {
        font-size: 0.78em;
        padding: 2px 8px;
        border-radius: 12px;
      }
      #previewTable th, #previewTable td {
        font-size: 0.88em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <a href="index.html" class="btn btn-secondary mb-3">กลับ</a>
      <h2 id="clubName">ชุมนุม</h2>
 
      <!-- ค้นหา -->
      <div class="mb-3">
        <input id="searchText" class="form-control" placeholder="ค้นหาชื่อนักเรียน" />
        <button class="btn btn-primary mt-2" onclick="searchStudents()">ค้นหา</button>
      </div>
      <div id="searchResult" class="mb-4"></div>
 
      <!-- รายชื่อสมาชิก -->
      <h4>รายชื่อสมาชิก</h4>
      <div id="memberList" class="mb-5"></div>
 
      <!-- Import CSV -->
      <hr />
      <h5 class="mb-3">📥 นำเข้าสมาชิกจาก CSV</h5>
      <div id="dropZone" onclick="document.getElementById('csvInput').click()">
        <div class="fs-4 mb-1">🗂️</div>
        <div>ลาก CSV มาวางที่นี่ หรือ <u>คลิกเพื่อเลือกไฟล์</u></div>
        <small class="text-muted">รองรับ: student_code, ชื่อ, นามสกุล (ไม่บังคับ)</small>
        <input type="file" id="csvInput" accept=".csv" onchange="handleFileSelect(event)" />
      </div>
 
      <!-- Preview -->
      <div id="previewSection" class="mt-4" style="display:none">
        <h6>ตรวจสอบข้อมูลก่อนบันทึก</h6>
        <div class="table-responsive">
          <table class="table table-sm table-bordered" id="previewTable">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>รหัส</th>
                <th>ชื่อ</th>
                <th>นามสกุล</th>
                <th>ชั้น/ห้อง</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="previewBody"></tbody>
          </table>
        </div>
        <div id="previewSummary" class="mb-3 text-muted small"></div>
        <button class="btn btn-success" id="confirmImportBtn" onclick="confirmImport()">✅ บันทึกสมาชิก</button>
        <button class="btn btn-outline-secondary ms-2" onclick="cancelImport()">ยกเลิก</button>
      </div>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/club.js"></script>
  </body>
</html>
