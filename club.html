<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ชุมนุม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body { background: #f5f5f3; }
      .page-card {
        background: #fff;
        border-radius: 12px;
        border: 0.5px solid #e0e0db;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
      }

      /* Search */
      #searchBox {
        border: 0.5px solid #c8c8c2;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 14px;
        width: 100%;
        background: #fff;
      }
      #searchBox:focus { outline: none; border-color: #888; }

      .grade-tab {
        padding: 5px 16px;
        border-radius: 8px;
        border: 0.5px solid #d0d0ca;
        background: #fff;
        font-size: 13px;
        cursor: pointer;
        color: #666;
        transition: all .12s;
      }
      .grade-tab.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; font-weight: 500; }

      .room-chip {
        padding: 3px 12px;
        border-radius: 14px;
        border: 0.5px solid #d0d0ca;
        font-size: 12px;
        cursor: pointer;
        background: #fff;
        color: #666;
        transition: all .12s;
      }
      .room-chip.active { border-color: #1a1a1a; color: #1a1a1a; font-weight: 500; }

      /* Result list */
      #resultListBox {
        border: 0.5px solid #e0e0db;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
        max-height: 340px;
        overflow-y: auto;
      }
      .section-label {
        font-size: 11px;
        font-weight: 500;
        color: #999;
        letter-spacing: .06em;
        padding: 7px 14px 4px;
        background: #f7f7f5;
        border-bottom: 0.5px solid #ebebea;
        text-transform: uppercase;
      }
      .student-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 14px;
        border-bottom: 0.5px solid #f0f0ee;
        font-size: 14px;
      }
      .student-row:last-child { border-bottom: none; }
      .student-code { font-size: 11px; color: #bbb; margin-left: 6px; }
      .add-btn {
        padding: 3px 14px;
        border-radius: 8px;
        border: 0.5px solid #b8ddb8;
        background: #f0f9f0;
        color: #2d7a2d;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      .add-btn:hover { background: #e0f2e0; }

      /* Member list */
      #memberListBox {
        border: 0.5px solid #e0e0db;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }
      .member-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 14px;
        border-bottom: 0.5px solid #f0f0ee;
        font-size: 14px;
      }
      .member-row:last-child { border-bottom: none; }
      .del-btn {
        padding: 3px 12px;
        border-radius: 8px;
        border: 0.5px solid #f0b8b8;
        background: #fff5f5;
        color: #b83232;
        font-size: 12px;
        cursor: pointer;
      }
      .del-btn:hover { background: #ffe8e8; }

      /* Drop zone */
      #dropZone {
        border: 1.5px dashed #c8c8c2;
        border-radius: 10px;
        padding: 28px;
        text-align: center;
        color: #888;
        cursor: pointer;
        background: #fafaf8;
        transition: background .15s, border-color .15s;
      }
      #dropZone.dragover { background: #eff6ff; border-color: #4a90e2; color: #2563eb; }
      #dropZone input[type="file"] { display: none; }

      /* Preview */
      #previewTable th, #previewTable td { font-size: 13px; white-space: nowrap; }
      .badge-ok    { background:#e8f5e8;color:#2a7a2a;font-size:11px;padding:2px 9px;border-radius:10px; }
      .badge-here  { background:#f0f0f0;color:#666;font-size:11px;padding:2px 9px;border-radius:10px; }
      .badge-other { background:#fff8e1;color:#b07800;font-size:11px;padding:2px 9px;border-radius:10px; }
      .badge-none  { background:#fff0f0;color:#b83232;font-size:11px;padding:2px 9px;border-radius:10px; }
    </style>
  </head>
  <body>
    <div class="container py-4" style="max-width:760px">
      <a href="index.html" class="btn btn-secondary btn-sm mb-3">← กลับ</a>
      <h2 id="clubName" class="mb-4">ชุมนุม</h2>

      <!-- เพิ่มสมาชิก -->
      <div class="page-card">
        <h6 class="mb-3" style="font-weight:500">เพิ่มสมาชิก</h6>

        <input id="searchBox" placeholder="ค้นหาชื่อ นามสกุล หรือรหัสนักเรียน..." oninput="onSearch()" />

        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px" id="gradeTabs">
          <button class="grade-tab active" data-grade="all" onclick="selectGrade('all')">ทุกชั้น</button>
          <button class="grade-tab" data-grade="4" onclick="selectGrade('4')">ม.4</button>
          <button class="grade-tab" data-grade="5" onclick="selectGrade('5')">ม.5</button>
          <button class="grade-tab" data-grade="6" onclick="selectGrade('6')">ม.6</button>
        </div>

        <div id="roomChips" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;min-height:26px"></div>

        <div id="resultListBox" style="margin-top:10px">
          <div id="resultList">
            <div style="padding:20px;text-align:center;color:#bbb;font-size:13px">พิมพ์ชื่อ หรือเลือกชั้น/ห้องเพื่อดูรายชื่อ</div>
          </div>
        </div>
        <div id="resultCount" style="font-size:12px;color:#bbb;text-align:right;margin-top:6px"></div>
      </div>

      <!-- รายชื่อสมาชิก -->
      <div class="page-card">
        <h6 style="font-weight:500;margin-bottom:12px">
          รายชื่อสมาชิก
          <span id="memberCount" style="color:#aaa;font-size:13px;font-weight:400"></span>
        </h6>
        <div id="memberListBox">
          <div id="memberList"></div>
        </div>
      </div>

      <!-- Import CSV -->
      <div class="page-card">
        <h6 style="font-weight:500;margin-bottom:12px">นำเข้าสมาชิกจาก CSV</h6>
        <div id="dropZone" onclick="document.getElementById('csvInput').click()">
          <div style="font-size:22px;margin-bottom:4px">📂</div>
          <div style="font-size:14px">ลาก CSV มาวางที่นี่ หรือ <u>คลิกเพื่อเลือกไฟล์</u></div>
          <div style="font-size:12px;color:#bbb;margin-top:4px">คอลัมน์: student_code หรือ รหัสนักเรียน</div>
          <input type="file" id="csvInput" accept=".csv" onchange="handleFileSelect(event)" />
        </div>

        <div id="previewSection" style="display:none;margin-top:16px">
          <div style="font-size:13px;font-weight:500;margin-bottom:8px">ตรวจสอบข้อมูลก่อนบันทึก</div>
          <div class="table-responsive">
            <table class="table table-sm table-bordered mb-2" id="previewTable">
              <thead class="table-light">
                <tr><th>#</th><th>รหัส</th><th>ชื่อ</th><th>นามสกุล</th><th>ชั้น/ห้อง</th><th>สถานะ</th></tr>
              </thead>
              <tbody id="previewBody"></tbody>
            </table>
          </div>
          <div id="previewSummary" class="mb-3" style="font-size:12px;color:#888"></div>
          <button class="btn btn-success btn-sm" id="confirmImportBtn" onclick="confirmImport()">บันทึกสมาชิก</button>
          <button class="btn btn-outline-secondary btn-sm ms-2" onclick="cancelImport()">ยกเลิก</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/club.js"></script>
  </body>
</html>
