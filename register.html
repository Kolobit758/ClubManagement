<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน | ระบบจัดการชุมนุม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

        :root { --bs-primary: #1E40AF; --bs-border-radius: 6px; }
        body { background-color: #F9FAFB; font-family: 'Sarabun', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 0; }
        .card { border-color: #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-radius: var(--bs-border-radius); }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card p-4 p-md-5">
            <h4 class="fw-bold text-center mb-4 text-primary">สมัครสมาชิกครู</h4>

            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label small fw-medium">ชื่อ</label>
                    <input type="text" id="firstname" class="form-control" placeholder="ชื่อจริง">
                </div>
                <div class="col-sm-6">
                    <label class="form-label small fw-medium">นามสกุล</label>
                    <input type="text" id="lastname" class="form-control" placeholder="นามสกุล">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-medium">อีเมล</label>
                <input type="email" id="email" class="form-control" placeholder="example@school.ac.th">
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-medium">รหัสผ่าน</label>
                <input type="password" id="password" class="form-control" placeholder="กำหนดรหัสผ่าน">
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-medium">ยืนยันรหัสผ่าน</label>
                <input type="password" id="confirm" class="form-control" placeholder="ยืนยันรหัสผ่านอีกครั้ง">
            </div>
            
            <button class="btn btn-primary w-100 fw-bold py-2" onclick="register()">ลงทะเบียน</button>
            
            <div class="text-center mt-3">
                <a href="login.html" class="text-decoration-none small text-muted">มีบัญชีอยู่แล้ว? <span class="text-primary fw-medium">เข้าสู่ระบบ</span></a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
