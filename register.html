<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>สมัครสมาชิก</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5" style="max-width: 450px">
      <h2>สมัครสมาชิกครู</h2>
      <input id="firstname" class="form-control mb-2" placeholder="ชื่อ" />
      <input id="lastname" class="form-control mb-2" placeholder="นามสกุล" />
      <input id="email" class="form-control mb-2" placeholder="Email" />
      <input
        id="password"
        type="password"
        class="form-control mb-2"
        placeholder="Password"
      />
      <input
        id="confirm"
        type="password"
        class="form-control mb-2"
        placeholder="Confirm Password"
      />
      <button class="btn btn-success w-100" onclick="register()">
        สมัครสมาชิก
      </button>
      <a href="login.html" class="btn btn-link w-100 mt-2">กลับไป Login</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
