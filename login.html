<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบจัดการชุมนุม</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --bs-primary: #1E40AF; --bs-border-radius: 6px; }
        body { background-color: #F9FAFB; font-family: 'Sarabun', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { border-color: #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-radius: var(--bs-border-radius); }
        .input-group-text { background: transparent; color: #9CA3AF; border-right: none; }
        .form-control { border-left: none; }
        .form-control:focus { box-shadow: none; border-color: #DEE2E6; }
        .input-group:focus-within { box-shadow: 0 0 0 0.25rem rgba(30, 64, 175, 0.25); border-radius: var(--bs-border-radius); }
        .input-group:focus-within .input-group-text, .input-group:focus-within .form-control { border-color: var(--bs-primary); }

        .swal2-popup { font-family: 'Sarabun', sans-serif; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 420px;">
        <div class="card p-4 p-md-5">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">ระบบจัดการชุมนุม</h3>
                <p class="text-muted small">กรุณาเข้าสู่ระบบเพื่อใช้งาน</p>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-medium">อีเมล</label>
                <div class="input-group">
                    <span class="input-group-text"><i data-lucide="mail" style="width: 18px;"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="example@school.ac.th">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-medium">รหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text"><i data-lucide="lock" style="width: 18px;"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••">
                </div>
            </div>
            

            <button class="btn btn-primary w-100 fw-bold py-2" onclick="login()">เข้าสู่ระบบ</button>
            
            <div class="text-center mt-4 pt-3 border-top">
                <a href="register.html" class="text-decoration-none small text-primary fw-medium">สมัครสมาชิกใหม่</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
